<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/assets/hero-dashboard.jpg" as="image" fetchpriority="high">
    <link rel="modulepreload" href="/src/main.tsx">
    <link rel="modulepreload" href="/src/App.tsx">
    <link rel="modulepreload" href="/src/integrations/supabase/client.ts">
    
    <!-- Preload font files directly for instant loading -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiA.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/playfairdisplay/v30/nuFvD-vYSZviVYUb_rj3ij__anPXJzDwcbmjWBN2PKdFvUDQZNLo_U2r.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- Early hints for critical resources -->
    <script>
      // Early connection establishment for faster resource loading
      if ('connection' in navigator && navigator.connection && navigator.connection.downlink > 1) {
        // Only for fast connections to avoid waste on slow networks
        const linkElem = document.createElement('link');
        linkElem.rel = 'preload';
        linkElem.as = 'script';
        linkElem.href = '/assets/index.js';
        document.head.appendChild(linkElem);
      }
    </script>
    
    <!-- Critical CSS inline for immediate render -->
    <style>
      /* Critical base styles to prevent layout shift */
      * { box-sizing: border-box; }
      html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      body { margin: 0; padding: 0; background: #ffffff; color: #0f172a; }
      #root { min-height: 100vh; }
      
      /* Critical above-the-fold styles */
      .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
      .grid { display: grid; gap: 2rem; grid-template-columns: 1fr; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .justify-between { justify-content: space-between; }
      .text-center { text-align: center; }
      .w-full { width: 100%; }
      .h-auto { height: auto; }
      .h-screen { height: 100vh; }
      .min-h-screen { min-height: 100vh; }
      .mx-auto { margin-left: auto; margin-right: auto; }
      .mb-4 { margin-bottom: 1rem; }
      .mb-8 { margin-bottom: 2rem; }
      .mt-8 { margin-top: 2rem; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
      .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
      .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
      .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
      .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
      .py-16 { padding-top: 4rem; padding-bottom: 4rem; }
      .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
      .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
      .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
      .text-2xl { font-size: 1.5rem; line-height: 2rem; }
      .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
      .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
      .font-medium { font-weight: 500; }
      .font-semibold { font-weight: 600; }
      .font-bold { font-weight: 700; }
      .rounded-md { border-radius: 0.375rem; }
      .rounded-lg { border-radius: 0.5rem; }
      .rounded-3xl { border-radius: 1.5rem; }
      .border { border-width: 1px; }
      .bg-white { background-color: #ffffff; }
      .bg-primary { background-color: #2563eb; }
      .text-white { color: #ffffff; }
      .text-primary { color: #2563eb; }
      .text-muted-foreground { color: #64748b; }
      .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
      .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
      .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
      .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
      .hover\:shadow-xl:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
      .hidden { display: none; }
      .block { display: block; }
      .relative { position: relative; }
      .absolute { position: absolute; }
      .inset-0 { top: 0px; right: 0px; bottom: 0px; left: 0px; }
      .z-10 { z-index: 10; }
      
      /* Loading skeleton styles */
      .skeleton { 
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }
      
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Initial loading screen */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #2563eb;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Dark mode support */
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f1f5f9; }
        .initial-loader { background: #0f172a; }
        .skeleton { 
          background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
          background-size: 200% 100%;
        }
      }
      
      /* Responsive grid */
      @media (min-width: 768px) {
        .grid { grid-template-columns: 1fr 1fr; }
        .text-4xl { font-size: 3rem; line-height: 1; }
        .md\:block { display: block; }
        .md\:hidden { display: none; }
      }
      
      /* Prevent flash of unstyled content with font fallbacks */
      .font-display { font-family: 'Playfair Display', -apple-system, BlinkMacSystemFont, serif; }
      .font-sans { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      
      /* Ensure smooth transitions when real fonts load */
      body { font-synthesis: none; text-rendering: optimizeLegibility; }
      h1, h2, h3, h4, h5, h6 { font-synthesis: none; }
    </style>
    
    <!-- Non-blocking font loading strategy -->
    <script>
      // Load fonts asynchronously after critical path
      function loadFonts() {
        if (!document.querySelector('link[href*="fonts.googleapis.com"]')) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap';
          link.media = 'print';
          link.onload = function() { this.media = 'all'; };
          document.head.appendChild(link);
        }
      }
      
      // Load fonts during idle time or after a short delay
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadFonts, { timeout: 500 });
      } else {
        setTimeout(loadFonts, 100);
      }
    </script>
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"></noscript>
    
    <!-- Non-blocking CSS loading strategy -->
    <script>
      // Load main CSS asynchronously to prevent render blocking
      function loadMainCSS() {
        if (!document.querySelector('link[href*="index"][href*=".css"]')) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          // Get the actual CSS filename from script tags or use a fallback
          const scripts = Array.from(document.querySelectorAll('script[src]'));
          let cssPath = '/assets/index.css'; // fallback
          
          // Try to extract CSS filename from module script
          scripts.forEach(script => {
            if (script.src && script.src.includes('assets')) {
              cssPath = script.src.replace('.js', '.css').replace(/index-[^.]+\.js/, 'index.css');
            }
          });
          
          link.href = cssPath;
          link.media = 'print';
          link.onload = function() { 
            this.media = 'all';
            if (window.onCSSLoaded) window.onCSSLoaded();
          };
          document.head.appendChild(link);
        }
      }
      
      // Start loading CSS immediately but non-blocking
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadMainCSS, { timeout: 100 });
      } else {
        setTimeout(loadMainCSS, 0);
      }
    </script>
    <noscript><link rel="stylesheet" href="/assets/index.css"></noscript>
    
    
    <!-- Additional performance optimizations -->
    <link rel="prefetch" href="/assets/index.js">
    <link rel="preload" href="/src/main.tsx" as="script" crossorigin>
    <link rel="canonical" href="https://taskmatch-pro.lovable.app/" />

    <meta property="og:title" content="ServiceHub — маркетплейс услуг" />
    <meta property="og:description" content="Быстро найдите специалиста. Эскроу, чаты, тендеры, мгновенные выплаты." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@servicehub" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Initial loading screen for immediate FCP -->
    <div id="initial-loader" class="initial-loader">
      <div class="loader-spinner"></div>
      <div style="margin-top: 1rem; font-size: 1.125rem; font-weight: 600; color: #2563eb;">ServiceHub</div>
      <div style="margin-top: 0.5rem; font-size: 0.875rem; color: #64748b;">Загрузка...</div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Enhanced loader management
      let cssLoaded = false;
      let domReady = false;
      
      function hideLoader() {
        if (cssLoaded && domReady) {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loader.style.display = 'none', 300);
          }
        }
      }
      
      // CSS loaded callback will be called from the CSS loading script
      window.onCSSLoaded = function() {
        cssLoaded = true;
        hideLoader();
      };
      
      document.addEventListener('DOMContentLoaded', function() {
        domReady = true;
        // If CSS hasn't loaded yet, wait a bit more
        setTimeout(() => {
          cssLoaded = true;
          hideLoader();
        }, 200);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
