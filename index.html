<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServiceHub — маркетплейс услуг</title>
    <meta name="description" content="ServiceHub: быстрый подбор проверенных специалистов, эскроу-платежи, тендеры, чаты, мгновенные выплаты." />
    <meta name="author" content="ServiceHub" />
    
    <!-- Cache control and performance hints -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preload" href="/assets/hero-dashboard.jpg" as="image" fetchpriority="high">
    <link rel="modulepreload" href="/src/main.tsx">
    <link rel="modulepreload" href="/src/App.tsx">
    <link rel="modulepreload" href="/src/integrations/supabase/client.ts">
    
    <!-- Additional resource hints for better caching -->
    <link rel="preload" href="/assets/index.js" as="script" crossorigin>
    <link rel="preload" href="/assets/index.css" as="style">
    
    <!-- Early hints for critical resources -->
    <script>
      // Early connection establishment for faster resource loading
      if ('connection' in navigator && navigator.connection && navigator.connection.downlink > 1) {
        // Only for fast connections to avoid waste on slow networks
        const linkElem = document.createElement('link');
        linkElem.rel = 'preload';
        linkElem.as = 'script';
        linkElem.href = '/assets/index.js';
        document.head.appendChild(linkElem);
      }
    </script>
    
    <!-- Critical CSS inline for immediate render -->
    <style>
      /* Critical base styles to prevent layout shift */
      * { box-sizing: border-box; }
      html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      body { margin: 0; padding: 0; background: #ffffff; color: #0f172a; }
      #root { min-height: 100vh; }
      
      /* Critical above-the-fold styles */
      .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
      .grid { display: grid; gap: 2rem; grid-template-columns: 1fr; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .justify-between { justify-content: space-between; }
      .text-center { text-align: center; }
      .w-full { width: 100%; }
      .h-auto { height: auto; }
      .h-screen { height: 100vh; }
      .min-h-screen { min-height: 100vh; }
      .mx-auto { margin-left: auto; margin-right: auto; }
      .mb-4 { margin-bottom: 1rem; }
      .mb-8 { margin-bottom: 2rem; }
      .mt-8 { margin-top: 2rem; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
      .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
      .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
      .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
      .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
      .py-16 { padding-top: 4rem; padding-bottom: 4rem; }
      .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
      .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
      .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
      .text-2xl { font-size: 1.5rem; line-height: 2rem; }
      .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
      .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
      .font-medium { font-weight: 500; }
      .font-semibold { font-weight: 600; }
      .font-bold { font-weight: 700; }
      .rounded-md { border-radius: 0.375rem; }
      .rounded-lg { border-radius: 0.5rem; }
      .rounded-3xl { border-radius: 1.5rem; }
      .border { border-width: 1px; }
      .bg-white { background-color: #ffffff; }
      .bg-primary { background-color: #2563eb; }
      .text-white { color: #ffffff; }
      .text-primary { color: #2563eb; }
      .text-muted-foreground { color: #64748b; }
      .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
      .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
      .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
      .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
      .hover\:shadow-xl:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
      .hidden { display: none; }
      .block { display: block; }
      .relative { position: relative; }
      .absolute { position: absolute; }
      .inset-0 { top: 0px; right: 0px; bottom: 0px; left: 0px; }
      .z-10 { z-index: 10; }
      
      /* Loading skeleton styles */
      .skeleton { 
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }
      
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Initial loading screen */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        z-index: 9999;
        overflow-y: auto;
      }
      
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #2563eb;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Dark mode support */
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f1f5f9; }
        .initial-loader { background: #0f172a; }
        .skeleton { 
          background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
          background-size: 200% 100%;
        }
        .bg-white { background-color: #1e293b !important; }
        .text-gray-900 { color: #f1f5f9 !important; }
        .border-gray-200 { border-color: #374151 !important; }
      }
      
      /* Responsive grid */
      @media (min-width: 768px) {
        .grid { grid-template-columns: 1fr 1fr; }
        .text-4xl { font-size: 3rem; line-height: 1; }
        .md\:block { display: block; }
        .md\:hidden { display: none; }
      }
      
      /* Prevent flash of unstyled content */
      .font-display { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
      .font-sans { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    
    <!-- Load Google Fonts with better non-blocking strategy -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
      // Advanced font loading to prevent render blocking
      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap';
          document.head.appendChild(link);
        });
      } else {
        setTimeout(() => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap';
          document.head.appendChild(link);
        }, 100);
      }
    </script>
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"></noscript>
    
    <!-- Defer all non-critical CSS completely -->
    <script>
      // Load main CSS after initial render
      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = '/assets/index.css';
          document.head.appendChild(link);
        });
      } else {
        setTimeout(() => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = '/assets/index.css';
          document.head.appendChild(link);
        }, 50);
      }
    </script>
    <noscript><link rel="stylesheet" href="/assets/index.css"></noscript>
    
    <!-- Resource hints for faster loading -->
    <link rel="prefetch" href="/assets/index.js">
    <link rel="canonical" href="https://taskmatch-pro.lovable.app/" />

    <meta property="og:title" content="ServiceHub — маркетплейс услуг" />
    <meta property="og:description" content="Быстро найдите специалиста. Эскроу, чаты, тендеры, мгновенные выплаты." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@servicehub" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Initial loading screen for immediate FCP and LCP -->
    <div id="initial-loader" class="initial-loader">
      <!-- Hero content skeleton for immediate LCP -->
      <div class="container max-w-6xl mx-auto px-4 py-16">
        <div class="grid lg:grid-cols-2 gap-16 items-center">
          <!-- Left Column - Critical Text Content -->
          <div class="text-left">
            <div class="mb-8">
              <div class="inline-flex items-center gap-3 px-4 py-2 rounded-full bg-primary/10 border border-primary/20 mb-6">
                <div style="width: 24px; height: 24px; background: #2563eb; border-radius: 3px;"></div>
                <span class="text-sm font-medium text-primary">Платформа нового поколения</span>
              </div>
              <h1 class="text-4xl lg:text-6xl font-bold mb-6 leading-tight text-primary">
                Соединяем клиентов с проверенными специалистами за секунды
              </h1>
              <p class="text-xl lg:text-2xl text-muted-foreground mb-8 leading-relaxed max-w-2xl">
                Escrow платежи, тендеры, чат, видео-оценка и мгновенные выплаты.
              </p>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 mb-12">
              <div class="bg-primary text-white px-8 py-4 rounded-xl font-semibold text-lg shadow-lg">
                🔍 Найти специалиста
              </div>
              <div class="bg-white text-gray-900 border border-gray-200 px-8 py-4 rounded-xl font-semibold text-lg shadow-lg">
                💼 Стать исполнителем
              </div>
            </div>
          </div>
          <!-- Right Column - Image placeholder -->
          <div class="relative">
            <div class="w-full h-96 bg-gray-200 rounded-3xl skeleton"></div>
          </div>
        </div>
      </div>
      
      <!-- Loading indicator skeleton -->
      <div style="position: fixed; bottom: 2rem; right: 2rem; display: flex; align-items: center; justify-content: center;">
        <div class="loader-spinner" style="width: 24px; height: 24px; border-width: 2px;"></div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Hide initial loader when React app starts
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.display = 'none';
          }
        }, 100);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
